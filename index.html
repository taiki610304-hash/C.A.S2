<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>コーティング見積もり</title>

<style>
body{font-family:-apple-system;background:#f5f5f7;margin:0;}

.fixed{
 position:sticky;top:0;background:#fff;padding:12px;
 border-bottom:1px solid #eee;font-size:14px;z-index:999;
}

.container{padding:20px;}

.card{
 background:#fff;padding:20px;border-radius:16px;margin-bottom:20px;
}

button{
 width:100%;padding:15px;margin:6px 0;border:none;
 border-radius:10px;background:#111;color:#fff;font-size:15px;
}

.confirm{background:#c9a100;color:#000;font-weight:bold;}
.recommend{border:2px solid #c9a100;}
.gold{background:linear-gradient(45deg,#c9a100,#ffd700);color:#000;}

.preview{
 background:#f0f0f0;padding:10px;border-radius:10px;margin:10px 0;
 font-weight:bold;
}

.hidden{display:none;}

.result{
 font-size:22px;font-weight:bold;text-align:center;
}
</style>
</head>

<body>

<div id="fixedBar" class="fixed hidden"></div>

<div class="container">

<!-- STEP1 -->
<div id="step1" class="card">
<h2>STEP1：サイズ</h2>

<button onclick="previewSize(0,'s')">S（軽）</button>
<button onclick="previewSize(7700,'m')">M（小型）</button>
<button onclick="previewSize(15400,'l')">L（普通車）</button>
<button onclick="previewSize(23100,'2l')">2L（大型）</button>

<div id="sizePreview" class="preview hidden"></div>
<button id="sizeBtn" class="confirm hidden" onclick="confirmSize()">次へ</button>
</div>

<!-- STEP2 -->
<div id="step2" class="card hidden">
<h2>STEP2：研磨</h2>

<button onclick="previewPolish(41800,'light')">
Light<br><small>新車・1年未満</small><br>¥41,800
</button>

<button onclick="previewPolish(52800,'standard')">
Standard<br><small>バランス</small><br>¥52,800
</button>

<button class="recommend" onclick="previewPolish(63800,'premium')">
⭐ Premium<br><small>艶重視</small><br>¥63,800
</button>

<div id="polishPreview" class="preview hidden"></div>
<button id="polishBtn" class="confirm hidden" onclick="confirmPolish()">次へ</button>
</div>

<!-- STEP3 -->
<div id="step3" class="card hidden">
<h2>STEP3：コーティング</h2>

<button onclick="previewCoat(16500,'basic')">
Basic<br><small>コスト重視</small><br>¥16,500
</button>

<button onclick="previewCoat(22000,'standard')">
Standard<br><small>バランス</small><br>¥22,000
</button>

<button class="recommend" onclick="previewCoat(27500,'premium')">
⭐ Premium<br><small>艶・耐久</small><br>¥27,500
</button>

<button onclick="previewCoat(38000,'ex')">
EX<br><small>高性能</small><br>¥38,000
</button>

<button class="gold" onclick="previewCoat(200000,'hi')">
🌟 G'ZOX ハイモース<br><small>別格</small><br>¥200,000
</button>

<div id="coatPreview" class="preview hidden"></div>
<button id="coatBtn" class="confirm hidden" onclick="confirmCoat()">確定</button>
</div>

<!-- RESULT -->
<div id="result" class="card hidden">
<h2>お見積もり</h2>
<div id="price" class="result"></div>
</div>

</div>

<script>

let total=0;
let tmpPrice=0;

let sizeText="";
let polishText="";
let coatText="";

let sizePrice=0;
let polishPrice=0;
let coatPrice=0;

// サイズ
function previewSize(p,t){
 tmpPrice=p;
 sizePrice=p;

 if(t=="s") sizeText="軽（N-BOX等）";
 if(t=="m") sizeText="小型（プリウス等）";
 if(t=="l") sizeText="普通車（ハリアー等）";
 if(t=="2l") sizeText="大型（アルファード等）";

 document.getElementById("sizePreview").innerText=sizeText;
 document.getElementById("sizePreview").classList.remove("hidden");
 document.getElementById("sizeBtn").classList.remove("hidden");

 updateBar();
}

function confirmSize(){
 total+=sizePrice;
 next("step1","step2");
}

// 研磨
function previewPolish(p,t){
 polishPrice=p;

 if(t=="light") polishText="Light";
 if(t=="standard") polishText="Standard";
 if(t=="premium") polishText="Premium";

 document.getElementById("polishPreview").innerText=polishText+"：¥"+p.toLocaleString();
 document.getElementById("polishPreview").classList.remove("hidden");
 document.getElementById("polishBtn").classList.remove("hidden");

 updateBar();
}

function confirmPolish(){
 total+=polishPrice;
 next("step2","step3");
}

// コーティング
function previewCoat(p,t){
 coatPrice=p;

 if(t=="basic") coatText="Basic";
 if(t=="standard") coatText="Standard";
 if(t=="premium") coatText="Premium";
 if(t=="ex") coatText="EX";
 if(t=="hi") coatText="G'ZOX ハイモース";

 document.getElementById("coatPreview").innerText=coatText+"：¥"+p.toLocaleString();
 document.getElementById("coatPreview").classList.remove("hidden");
 document.getElementById("coatBtn").classList.remove("hidden");

 updateBar();
}

function confirmCoat(){
 total+=coatPrice;
 next("step3","result");
 document.getElementById("price").innerText="合計："+total.toLocaleString()+"円";
}

// 共通
function next(a,b){
 document.getElementById(a).classList.add("hidden");
 document.getElementById(b).classList.remove("hidden");
}

// 上部バー
function updateBar(){
 let sum = sizePrice + polishPrice + coatPrice;

 let text = "";
 if(sizeText) text += sizeText;
 if(polishText) text += " / " + polishText;
 if(coatText) text += " / " + coatText;

 text += " ｜ 合計：約" + sum.toLocaleString() + "円";

 let bar=document.getElementById("fixedBar");
 bar.innerText=text;
 bar.classList.remove("hidden");
}

</script>

</body>
</html>
