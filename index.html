<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>コーティング見積もり</title>

<style>
body{font-family:-apple-system;background:#f5f5f7;margin:0;}
.fixed{position:sticky;top:0;background:#fff;padding:12px;border-bottom:1px solid #eee;font-size:14px;z-index:999;}
.container{padding:20px;}
.card{background:#fff;padding:20px;border-radius:16px;margin-bottom:20px;}
button{width:100%;padding:15px;margin:6px 0;border:none;border-radius:10px;background:#111;color:#fff;}
.confirm{background:#c9a100;color:#000;}
.recommend{border:2px solid #c9a100;}
.gold{background:linear-gradient(45deg,#c9a100,#ffd700);color:#000;}
.preview{background:#f0f0f0;padding:10px;border-radius:10px;margin:10px 0;font-weight:bold;}
.hidden{display:none;}
.result{font-size:22px;font-weight:bold;text-align:center;}
</style>
</head>

<body>

<div id="fixedBar" class="fixed hidden"></div>

<div class="container">

<!-- STEP1 -->
<div id="step1" class="card">
<h2>STEP1：サイズ</h2>

<button onclick="previewSize('s')">S（軽）</button>
<button onclick="previewSize('m')">M（小型）</button>
<button onclick="previewSize('l')">L（普通車）</button>
<button onclick="previewSize('2l')">2L（大型）</button>

<div id="sizePreview" class="preview hidden"></div>
<button id="sizeBtn" class="confirm hidden" onclick="confirmSize()">次へ</button>
</div>

<!-- STEP2 -->
<div id="step2" class="card hidden">
<h2>STEP2：研磨</h2>

<button onclick="previewPolish('light')">
Light（1行程）<br><small>新車・軽度向け</small>
</button>

<button onclick="previewPolish('standard')">
Standard（2行程）<br><small>バランス重視</small>
</button>

<button class="recommend" onclick="previewPolish('premium')">
⭐ Premium（3行程）<br><small>艶・仕上がり重視</small>
</button>

<div id="polishPreview" class="preview hidden"></div>
<button id="polishBtn" class="confirm hidden" onclick="confirmPolish()">次へ</button>
</div>

<!-- STEP3 -->
<div id="step3" class="card hidden">
<h2>STEP3：コーティング</h2>

<button onclick="previewCoat(16500,'Basic')">Basic ¥16,500</button>
<button onclick="previewCoat(22000,'Standard')">Standard ¥22,000</button>

<button class="recommend" onclick="previewCoat(27500,'Premium')">
⭐ Premium ¥27,500
</button>

<button onclick="previewCoat(38000,'EX')">EX ¥38,000</button>

<button class="gold" onclick="previewCoat(140000,'G\'ZOX ハイモース')">
🌟 G'ZOX ハイモース ¥140,000
</button>

<div id="coatPreview" class="preview hidden"></div>
<button id="coatBtn" class="confirm hidden" onclick="confirmCoat()">確定</button>
</div>

<!-- RESULT -->
<div id="result" class="card hidden">
<h2>お見積もり</h2>
<div id="price" class="result"></div>
</div>

</div>

<script>

let total=0;

let sizeType="";
let sizeText="";
let polishPrice=0;
let coatPrice=0;

// サイズ
function previewSize(t){
 sizeType=t;

 if(t=="s") sizeText="軽（N-BOX等）";
 if(t=="m") sizeText="小型（プリウス等）";
 if(t=="l") sizeText="普通車（ハリアー等）";
 if(t=="2l") sizeText="大型（アルファード等）";

 document.getElementById("sizePreview").innerText=sizeText;
 document.getElementById("sizePreview").classList.remove("hidden");
 document.getElementById("sizeBtn").classList.remove("hidden");

 updateBar();
}

function confirmSize(){
 next("step1","step2");
}

// 研磨価格（サイズ連動）
function getPolishPrice(type){
 if(sizeType=="s"){
   if(type=="light") return 41800;
   if(type=="standard") return 52800;
   if(type=="premium") return 63800;
 }
 if(sizeType=="m"){
   if(type=="light") return 49500;
   if(type=="standard") return 60500;
   if(type=="premium") return 71500;
 }
 if(sizeType=="l"){
   if(type=="light") return 57200;
   if(type=="standard") return 68200;
   if(type=="premium") return 79200;
 }
 if(sizeType=="2l"){
   if(type=="light") return 64900;
   if(type=="standard") return 75900;
   if(type=="premium") return 86900;
 }
}

// 研磨
function previewPolish(type){

 polishPrice = getPolishPrice(type);

 let text="";
 if(type=="light") text="1行程（軽研磨）";
 if(type=="standard") text="2行程（中研磨）";
 if(type=="premium") text="3行程（仕上げ研磨）";

 document.getElementById("polishPreview").innerText=
 text+"：¥"+polishPrice.toLocaleString();

 document.getElementById("polishPreview").classList.remove("hidden");
 document.getElementById("polishBtn").classList.remove("hidden");

 updateBar();
}

function confirmPolish(){
 total+=polishPrice;
 next("step2","step3");
}

// コーティング
function previewCoat(price,name){
 coatPrice=price;

 document.getElementById("coatPreview").innerText=
 name+"：¥"+price.toLocaleString();

 document.getElementById("coatPreview").classList.remove("hidden");
 document.getElementById("coatBtn").classList.remove("hidden");

 updateBar();
}

function confirmCoat(){
 total+=coatPrice;
 next("step3","result");

 document.getElementById("price").innerText=
 "合計："+total.toLocaleString()+"円";
}

// 共通
function next(a,b){
 document.getElementById(a).classList.add("hidden");
 document.getElementById(b).classList.remove("hidden");
}

// 上部表示
function updateBar(){
 let sum = polishPrice + coatPrice;

 let text = sizeText;
 if(polishPrice) text += " / 研磨";
 if(coatPrice) text += " / コーティング";

 if(sum>0) text += " ｜ 約"+sum.toLocaleString()+"円";

 let bar=document.getElementById("fixedBar");
 bar.innerText=text;
 bar.classList.remove("hidden");
}

</script>

</body>
</html>
