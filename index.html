<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C.A.S ESTIMATE</title>

<style>
:root{
 --gold:#d4af37; --accent:#3b82f6; --bg:#000;
 --card:#111; --text:#fff; --sub:#aaa;
 --border:#262626; --line:#06c755;
}
body{
 margin:0;background:#000;color:#fff;
 font-family:sans-serif;display:flex;justify-content:center;
}
.container{
 max-width:500px;width:100%;padding:20px;
 background:#111;border-radius:20px;margin-bottom:140px;
 border:1px solid var(--border);
}
h2{
 text-align:center;letter-spacing:3px;
 border-bottom:1px solid #333;padding-bottom:10px;
 color:var(--gold);
}
.step{display:none;}
.step.active{display:block;}

.option{
 background:#1a1a1a;padding:15px;margin-bottom:12px;
 border-radius:12px;border:1px solid #333;cursor:pointer;
}
.option.selected{
 border:1px solid var(--accent);
 background:#16213e;
}
.price{float:right;color:var(--accent);font-weight:bold;}

button{
 width:100%;padding:16px;margin-top:10px;
 border:none;border-radius:10px;font-weight:bold;
}
.next{background:var(--accent);color:#fff;}
.prev{background:#222;color:#aaa;}

.total-panel{
 position:fixed;bottom:15px;left:50%;
 transform:translateX(-50%);
 width:90%;max-width:450px;
 background:#0f172a;padding:15px;
 border-radius:16px;text-align:center;
 border:1px solid var(--accent);
}
</style>
</head>

<body>

<div class="container">
<h2>C.A.S ESTIMATE</h2>

<!-- STEP1 -->
<div class="step active" id="step1">

<h3>01 サイズ選択</h3>

<!-- 寸法入力 -->
<div style="background:#1a1a1a;padding:15px;border-radius:12px;margin-bottom:15px;">
<div style="font-size:0.9em;margin-bottom:8px;">車両サイズ入力（cm）</div>
<input id="len" placeholder="長さ" style="width:30%;">
<input id="wid" placeholder="幅" style="width:30%;">
<input id="hei" placeholder="高さ" style="width:30%;">
<button onclick="autoSize()">自動判定</button>
</div>

<div class="option" onclick="select('size','S')">S（軽自動車）</div>
<div class="option" onclick="select('size','M')">M（～10.5未満）</div>
<div class="option" onclick="select('size','L')">L（10.5～12.3未満）</div>
<div class="option" onclick="select('size','2L')">2L（12.3～14.0未満）</div>
<div class="option" onclick="select('size','3L')">3L（14.0～17.0未満）</div>
<div class="option" onclick="select('size','4L')">4L（17.0～）</div>

<button class="next" onclick="move(2)">次へ</button>
</div>

<!-- STEP2 -->
<div class="step" id="step2">
<h3>02 下地研磨</h3>

<div class="option" onclick="select('polish','Light')">
<span class="price" id="p1"></span>Light
</div>
<div class="option" onclick="select('polish','Standard')">
<span class="price" id="p2"></span>Standard
</div>
<div class="option" onclick="select('polish','Premium')">
<span class="price" id="p3"></span>Premium
</div>

<button class="prev" onclick="move(1)">戻る</button>
<button class="next" onclick="move(3)">次へ</button>
</div>

<!-- STEP3 -->
<div class="step" id="step3">
<h3>03 コーティング</h3>

<div class="option" onclick="select('coat','Entry')">
<span class="price" id="c1"></span>Basic
</div>
<div class="option" onclick="select('coat','Standard')">
<span class="price" id="c2"></span>Standard
</div>
<div class="option" onclick="select('coat','Premium')">
<span class="price" id="c3"></span>Premium
</div>

<button class="prev" onclick="move(2)">戻る</button>
</div>

</div>

<div class="total-panel">
合計 ¥<span id="totalDisplay">0</span>
</div>

<script>

const price={
 polish:{
  Light:{S:16500,M:18700,L:20900,'2L':23100,'3L':25300,'4L':27500},
  Standard:{S:33000,M:35200,L:37400,'2L':39600,'3L':41800,'4L':44000},
  Premium:{S:49500,M:51700,L:53900,'2L':56100,'3L':58300,'4L':60500}
 },
 coat:{
  Entry:{S:33000,M:35200,L:37400,'2L':39600,'3L':41800,'4L':44000},
  Standard:{S:55000,M:57200,L:59400,'2L':61600,'3L':63800,'4L':66000},
  Premium:{S:66000,M:68200,L:70400,'2L':72600,'3L':74800,'4L':77000}
 }
};

let sel={size:'S',polish:'Light',coat:'Entry'};

function select(type,val){
 sel[type]=val;
 calc();
}

function autoSize(){
 const l=document.getElementById("len").value;
 const w=document.getElementById("wid").value;
 const h=document.getElementById("hei").value;

 if(!l||!w||!h)return alert("入力してください");

 const v=(l*w*h)/1000000;

 let size="S";

 if(v<10.5) size="M";
 else if(v<12.3) size="L";
 else if(v<14.0) size="2L";
 else if(v<17.0) size="3L";
 else size="4L";

 sel.size=size;
 calc();
}

function calc(){
 const t=price.polish[sel.polish][sel.size]
        +price.coat[sel.coat][sel.size];

 document.getElementById("totalDisplay").innerText=
 t.toLocaleString();

 document.getElementById('p1').innerText="¥"+price.polish.Light[sel.size].toLocaleString();
 document.getElementById('p2').innerText="¥"+price.polish.Standard[sel.size].toLocaleString();
 document.getElementById('p3').innerText="¥"+price.polish.Premium[sel.size].toLocaleString();
 document.getElementById('c1').innerText="¥"+price.coat.Entry[sel.size].toLocaleString();
 document.getElementById('c2').innerText="¥"+price.coat.Standard[sel.size].toLocaleString();
 document.getElementById('c3').innerText="¥"+price.coat.Premium[sel.size].toLocaleString();
}

function move(n){
 document.querySelectorAll('.step').forEach(s=>s.classList.remove('active'));
 document.getElementById('step'+n).classList.add('active');
}

window.onload=calc;

</script>

</body>
</html>
