<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>コーティング見積もり</title>

<style>
body{
  font-family:-apple-system;
  background:#f5f5f7;
  margin:0;
  padding:0;
}

.fixed{
  position:sticky;
  top:0;
  background:#fff;
  padding:12px;
  font-weight:bold;
  z-index:999;
  border-bottom:1px solid #eee;
}

.container{
  padding:20px;
}

.card{
  background:#fff;
  padding:20px;
  border-radius:16px;
  margin-bottom:20px;
  box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

.desc{
  font-size:14px;
  color:#666;
  margin-bottom:10px;
}

.highlight{
  background:#f0f0f0;
  padding:10px;
  border-radius:10px;
  margin:10px 0;
  font-weight:bold;
}

button{
  width:100%;
  padding:15px;
  margin:6px 0;
  font-size:16px;
  border:none;
  border-radius:10px;
  background:#111;
  color:#fff;
}

.confirm{
  background:#c9a100;
  color:#000;
  font-weight:bold;
}

.recommend{
  border:2px solid #c9a100;
}

.gold{
  background:linear-gradient(45deg,#c9a100,#ffd700);
  color:#000;
}

.hidden{ display:none; }

.result{
  font-size:22px;
  font-weight:bold;
  text-align:center;
}
</style>
</head>

<body>

<!-- 固定表示 -->
<div id="fixedBar" class="fixed hidden"></div>

<div class="container">

<!-- STEP1 -->
<div id="step1" class="card">
<h2>STEP1：サイズ選択</h2>
<div class="desc">サイズを選択 → 内容確認 → 次へ進みます</div>

<button onclick="previewSize(0,'s')">S（軽自動車）</button>
<button onclick="previewSize(7700,'m')">M（小型普通車）</button>
<button onclick="previewSize(15400,'l')">L（普通車・SUV・ミニバン）</button>
<button onclick="previewSize(23100,'2l')">2L（大型）</button>

<div id="previewBox" class="highlight hidden"></div>

<button id="confirmBtn" class="confirm hidden" onclick="confirmSize()">
このサイズで次へ
</button>
</div>

<!-- STEP2 -->
<div id="step2" class="card hidden">
<h2>STEP2：研磨</h2>

<button onclick="selectPolish(41800)">Light（新車・1年未満向け）</button>
<button onclick="selectPolish(52800)">Standard（バランス重視）</button>

<button class="recommend" onclick="selectPolish(63800)">
⭐ Premium（おすすめ）
</button>
</div>

<!-- STEP3 -->
<div id="step3" class="card hidden">
<h2>STEP3：コーティング</h2>

<button onclick="selectCoat(16500)">Basic（コスト重視）</button>
<button onclick="selectCoat(22000)">Standard（バランス）</button>

<button class="recommend" onclick="selectCoat(27500)">
⭐ Premium（おすすめ）
</button>

<button onclick="selectCoat(38000)">EX（高性能）</button>

<button class="gold" onclick="selectCoat(200000)">
🌟 G'ZOX ハイモース
</button>
</div>

<!-- RESULT -->
<div id="result" class="card hidden">
<h2>お見積もり</h2>
<div id="price" class="result"></div>
</div>

</div>

<script>

let total = 0;
let selectedPrice = 0;
let carText = "";

// サイズプレビュー
function previewSize(price,type){

  selectedPrice = price;

  if(type == "s"){
    carText = "対象：N-BOX・タント・ワゴンR";
  }
  if(type == "m"){
    carText = "対象：プリウス・カローラ・ノート";
  }
  if(type == "l"){
    carText = "対象：ハリアー・ヴォクシー・セレナ";
  }
  if(type == "2l"){
    carText = "対象：アルファード・ヴェルファイア・ハイエース・ランクル";
  }

  document.getElementById("previewBox").innerText = carText;
  document.getElementById("previewBox").classList.remove("hidden");
  document.getElementById("confirmBtn").classList.remove("hidden");

  // 固定バー表示
  let bar = document.getElementById("fixedBar");
  bar.innerText = "選択サイズ：" + carText;
  bar.classList.remove("hidden");
}

// サイズ確定
function confirmSize(){
  total += selectedPrice;

  document.getElementById("step1").classList.add("hidden");
  document.getElementById("step2").classList.remove("hidden");
}

// 研磨
function selectPolish(price){
  total += price;

  document.getElementById("step2").classList.add("hidden");
  document.getElementById("step3").classList.remove("hidden");

  document.getElementById("fixedBar").innerText += " / 研磨選択済み";
}

// コーティング
function selectCoat(price){
  total += price;

  document.getElementById("step3").classList.add("hidden");
  document.getElementById("result").classList.remove("hidden");

  document.getElementById("price").innerText =
    "合計金額：" + total.toLocaleString() + "円";

  document.getElementById("fixedBar").innerText += " / コーティング選択済み";
}

</script>

</body>
</html>
